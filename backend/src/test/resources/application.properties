# Use unreachable port — all repos are @MockBean so MongoDB is never actually contacted
spring.data.mongodb.uri=mongodb://localhost:27117/eulo-test
jwt.secret=test-secret-key-for-integration-tests-must-be-32-chars-long!
jwt.expiration-ms=86400000

# Actuator: nur health exponieren, MongoDB-Ping im Test deaktivieren
management.endpoints.web.exposure.include=health
management.health.mongo.enabled=false

# Rate-Limiting in Tests deaktivieren – RateLimitFilter ist ein Singleton,
# dessen Zustand (loginBlocked-Map) über alle Tests geteilt wird. Ohne diese
# Einstellung blockiert der Filter nach 5 Login-Versuchen alle weiteren
# obtainToken()-Aufrufe mit HTTP 429, was zu NullPointerExceptions führt.
rate-limit.enabled=false

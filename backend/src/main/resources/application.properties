spring.application.name=eulo-backend
server.port=8080
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/eulo}
jwt.secret=${JWT_SECRET:euloSuperSecretKeyThatIsAtLeast32CharsLong!}
jwt.expiration-ms=86400000

# Logging
logging.level.root=WARN
logging.level.com.eulo=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Payload size limits (prevents large-payload DoS)
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

# Connection timeouts (prevents Slowloris-style attacks)
server.tomcat.connection-timeout=5000
server.tomcat.keep-alive-timeout=20000

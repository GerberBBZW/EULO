server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security: hide nginx version ───────────────────────────────────────────
    server_tokens off;

    # ── Payload & timeout limits (anti-DoS / Slowloris) ────────────────────────
    client_max_body_size        2m;
    client_body_timeout         10s;
    client_header_timeout       10s;
    keepalive_timeout           30s;
    send_timeout                10s;

    # ── Security response headers ───────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection for older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # No Referer header to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strict Content Security Policy
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
        always;

    # Disable browser features we don't use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API proxy to backend ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass              http://backend:8080/api/;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Proxy timeouts
        proxy_connect_timeout   5s;
        proxy_send_timeout      10s;
        proxy_read_timeout      30s;

        # Limit request body size to backend
        client_max_body_size    2m;

        # Do not expose backend server header
        proxy_hide_header       Server;
        proxy_hide_header       X-Powered-By;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden files (e.g., .env, .git) ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}

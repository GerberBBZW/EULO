services:
  mongodb:
    image: mongo:7
    container_name: eulo-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: eulo
    volumes:
      - mongo_data:/data/db
    networks:
      - eulo-net

  backend:
    build: ./backend
    container_name: eulo-backend
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/eulo}
      JWT_SECRET: ${JWT_SECRET:-euloChangeThisInProductionToALongRandomSecret}
    volumes:
      - ./logs:/app/logs          # Log-Dateien auf dem Host (für WAZUH-Agent)
    depends_on:
      - mongodb
    networks:
      - eulo-net

  frontend:
    build: ./frontend
    container_name: eulo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eulo-net

  # Test-Service mit persistentem Maven-Cache
  # Erstes Mal (mit Internet):  docker compose --profile test run --rm test
  # Ab dann offline:            docker compose --profile test run --rm test mvn test -o -B
  test:
    image: maven:3.9-eclipse-temurin-21
    container_name: eulo-test
    working_dir: /app
    volumes:
      - ./backend:/app          # Quellcode live eingebunden
      - maven_cache:/root/.m2   # Persistenter Dependency-Cache (überlebt Container-Stop)
    command: mvn test -B        # Default: online; für offline: mvn test -o -B
    profiles:
      - test                    # Nicht Teil des normalen docker compose up

volumes:
  mongo_data:
  maven_cache:                  # Überlebt container stop/remove

networks:
  eulo-net:
    driver: bridge
